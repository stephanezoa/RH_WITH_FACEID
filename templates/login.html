{% extends "base.html" %}
{% block content %}
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-4 text-center">Connexion</h2>
        {% if error %}
            <p class="text-red-500 text-center">{{ error }}</p>
        {% endif %}
        <form action="/api/auth/login" method="post" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label for="nom_utilisateur" class="block text-sm font-medium text-gray-700">Nom d'utilisateur</label>
                <input type="text" id="nom_utilisateur" name="nom_utilisateur" required class="w-full p-2 border rounded-md">
            </div>
            <div>
                <label for="mot_de_passe" class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input type="password" id="mot_de_passe" name="mot_de_passe" required class="w-full p-2 border rounded-md">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700">Se connecter</button>
        </form>
    </div>
{% endblock %}
